<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="baidu_union_verify" content="2187720274a2ad1c44b0a80373da0a1c">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无尽地下城 - Roguelike冒险">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .game-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: #ffd700;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .game-card {
            background: rgba(255, 255, 255, 0.08);
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255, 215, 0, 0.2);
            margin: 0 auto;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            border-color: rgba(255, 215, 0, 0.5);
        }

        .game-card h2 {
            color: #a855f7;
            margin-bottom: 15px;
            font-size: 1.8em;
        }

        .game-card p {
            color: #aaa;
            font-size: 1.1em;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>⚔️ 无尽地下城</h1>
        <div class="game-card" onclick="window.location.href='roguelike/index.html'">
            <h2>🏰 开始冒险</h2>
            <p>探索无限层数的地下城，打怪升级，收集装备，挑战BOSS！</p>
        </div>
    </div>
</body>
</html>
