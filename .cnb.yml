name: Deploy to EdgeOne Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Deploy to EdgeOne Pages
        run: |
          npx edgeone pages deploy ./ -n roguelike-game -t ${{ secrets.EDGEONE_API_TOKEN }}
